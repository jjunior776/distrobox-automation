---
- name: Setup IntelliJ IDEA Community Edition
  hosts: localhost
  connection: local
  become: true
  vars:
    # This URL redirected to the latest .tar.gz
    intellij_url: "https://download.jetbrains.com/product?code=IIC&latest&distribution=linux"
    install_dir: "/opt/intellij-idea"
    bin_link: "/usr/local/bin/idea"

  tasks:
    - name: Ensure installation directory exists
      become: true
      ansible.builtin.file:
        path: "{{ install_dir }}"
        state: directory
        mode: '0755'

    - name: Download and extract IntelliJ IDEA
      become: true
      ansible.builtin.unarchive:
        src: "{{ intellij_url }}"
        dest: "{{ install_dir }}"
        remote_src: true
        extra_opts: [--strip-components=1]
        creates: "{{ install_dir }}/bin/idea.sh"

    - name: Create a symlink to the executable
      become: true
      ansible.builtin.file:
        src: "{{ install_dir }}/bin/idea.sh"
        dest: "{{ bin_link }}"
        state: link

    - name: Ensure dependencies are present (Example for Fedora/RedHat)
      become: true
      ansible.builtin.package:
        name:
          - libXrender
          - libXtst
          - fontconfig
        state: present
      when: ansible_os_family == "RedHat"

    - name: Ensure dependencies are installed
      ansible.builtin.dnf:
        name:
          - curl
          - git
        state: present

    - name: Download and execute OpenCode installation script
      ansible.builtin.shell:
        cmd: |
          curl -fsSL https://opencode.ai/install | bash
        creates: /usr/local/bin/opencode
      register: install_result
      failed_when: install_result.rc != 0
      changed_when: install_result.rc == 0

    - name: Ensure OpenCode bin is in PATH
      ansible.builtin.lineinfile:
        path: ~/.bashrc
        line: 'export PATH="$HOME/.opencode/bin:$PATH"'
        create: true
        mode: '0644'

    - name: Ensure OpenCode configuration directory exists
      ansible.builtin.file:
        path: ~/.config/opencode
        state: directory
        mode: '0755'

    - name: Configure OpenCode for local Qwen
      ansible.builtin.copy:
        dest: "~/.config/opencode/opencode.json"
        content: |
          {
            "provider": "ollama",
            "model": "qwen2.5-coder:14b",
            "apiBase": "http://localhost:11434"
          }
        mode: '0644'  # Set appropriate file permissions
